<ion-content [fullscreen]="true">
  <section class="login-page-container">
    <div class="login-header">
      <h2 class="login-main-title">Crea tu cuenta</h2>
      <p class="login-subtitle">Únete a la familia SmileLab</p>
    </div>
    
    <div class="login-card-wrapper">
      <form [formGroup]="registroForm" (ngSubmit)="onRegister()" class="premium-login-form">
        
        <div class="login-input-group">
          <label>Nombre completo:</label>
          <ion-input type="text" formControlName="nombre" placeholder="Tu nombre" class="custom-input"></ion-input>
          <div *ngIf="registroForm.get('nombre')?.touched && registroForm.get('nombre')?.invalid">
            <small class="error-text">Introduce tu nombre.</small>
          </div>
        </div>

        <div class="login-input-group">
          <label>Correo electrónico:</label>
          <ion-input type="email" formControlName="email" placeholder="tu@email.com" class="custom-input"></ion-input>
          <div *ngIf="registroForm.get('email')?.touched && registroForm.get('email')?.invalid">
            <small class="error-text">Email inválido.</small>
          </div>
        </div>

        <div class="login-input-group">
          <label>Teléfono:</label>
          <ion-input type="tel" formControlName="telefono" placeholder="Ej: 600123456" class="custom-input"></ion-input>
          <div *ngIf="registroForm.get('telefono')?.touched && registroForm.get('telefono')?.invalid">
            <small class="error-text">Teléfono inválido (9-15 dígitos).</small>
          </div>
        </div>
        
        <div class="login-input-group">
          <label>Contraseña:</label>
          <ion-input type="password" formControlName="password" placeholder="Mínimo 6 caracteres" class="custom-input"></ion-input>
          <div *ngIf="registroForm.get('password')?.touched && registroForm.get('password')?.invalid">
            <small class="error-text">Mínimo 6 caracteres.</small>
          </div>
        </div>

        <div class="login-action-container">
          <button type="submit" [disabled]="registroForm.invalid || isSubmitting" class="btn-login-submit">
            <span *ngIf="!isSubmitting">Registrarse →</span>
            <ion-spinner *ngIf="isSubmitting" name="crescent"></ion-spinner>
          </button>
        </div>

        <div class="login-footer-links">
          <p>¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión aquí</a></p>
        </div>
      </form>
    </div>
  </section>
</ion-content>
