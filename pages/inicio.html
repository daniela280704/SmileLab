<!-- Plantilla HTML genérica para la página de inicio -->
<section class="hero-banner">
    <h1 id="home-title"></h1>
</section>
<div id="about-hero" class="hero-section">
  <div class="hero-content">
    <h1 id="about-title"></h1>
    <p id="about-text"></p>
    <a id="about-button"><button class="btn-primary"></button></a>
  </div>
  <div class="hero-image">
    <img id="about-image" src="" alt="" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
    <div class="img-box-gris" style="display:none; aspect-ratio: 16/10;"></div>
  </div>
</div>
<section class="servicios-section">
    <h2 id="home-services-title"></h2>
    <div id="home-services-grid" class="servicios-grid">
    </div>
    <div class="btn-wrap">
        <a id="home-services-button"><button class="btn-primary"></button></a>
    </div>
</section>
