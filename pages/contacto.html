<!-- Plantilla HTML genérica para la página de contacto -->
<section class="page-hero">
    <h1 id="contact-hero-title"></h1>
</section>
<section>
    <h2 id="contact-sub-title" class="section-title"></h2>
    <div class="contact-cards-container">
        <article class="contact-card">
            <div class="contact-icon tel" aria-hidden="true">📞</div>
            <strong>Teléfono</strong>
            <p><a id="contact-phone" href=""></a></p>
        </article>
        <article class="contact-card">
            <div class="contact-icon whatsapp" aria-hidden="true">💬</div>
            <strong>Whatsapp</strong>
            <p><a id="contact-whatsapp" href="" target="_blank" rel="noopener noreferrer"></a></p>
        </article>
        <article class="contact-card">
            <div class="contact-icon email" aria-hidden="true">✉</div>
            <strong>Email</strong>
            <p><a id="contact-email" href=""></a></p>
        </article>
    </div>
</section>
<div xlu-include-file="templates/form.html" data-section-class="contact-form-section" data-title-tag="h3"
     data-title="Solicita tu cita y crea tu cuenta" data-form-action="#perfil" data-form-method="post" data-form-class="combined-form" data-btn-text="Enviar y registrarme">
    <label for="reg-nombre">Nombre completo:</label>
    <input type="text" id="reg-nombre" name="reg-nombre" placeholder="Ej: Juan Pérez" required minlength="3">
    <label for="user-email">Correo electrónico:</label>
    <input type="email" id="user-email" name="user-email" placeholder="Ej: juan@email.com" required>
    <label for="reg-tel">Teléfono (9 dígitos):</label>
    <input type="tel" id="reg-tel" name="reg-tel" placeholder="Ej: 600123456" required pattern="[0-9]{9}" title="Debe contener exactamente 9 números">
    <label for="reg-password">Contraseña (mín. 6 caracteres):</label>
    <input type="password" id="reg-password" name="reg-password" placeholder="Para acceder a tu área de paciente" required minlength="6">
    <label for="appointment-day">Fecha de la cita:</label>
    <input type="date" id="appointment-day" name="appointment-day" required>
    <label for="appointment-time">Hora:</label>
    <input type="time" id="appointment-time" name="appointment-time" required>
    <label for="appointment-reason">Motivo de la cita:</label>
    <input type="text" id="appointment-reason" name="appointment-reason" placeholder="Ej: Revisión anual" required minlength="5">
    <label for="appointment-professional">Nombre del profesional:</label>
    <input type="text" id="appointment-professional" name="appointment-professional" placeholder="Ej: Dr. García" required>
</div>
<div class="hero-section">
  <div class="hero-content">
    <h1 id="contact-map-title"></h1>
    <p id="contact-map-text"></p>
    <a id="contact-map-button" target="_blank" rel="noopener noreferrer"><button class="btn-primary">Abrir en Google Maps</button></a>
  </div>
  <div class="hero-image">
    <img id="contact-map-image" src="img/contacto-hero.jpg" alt="Mapa de ubicación">
  </div>
</div>
