<!-- Plantilla HTML genérica para la página de login -->
<div xlu-include-file="templates/form.html" data-section-class="login-section" data-title-tag="h2"
     data-title="Identifícate" data-form-action="index.html#perfil" data-form-method="post" data-form-class="login-form"
     data-btn-container-class="login-btn-container" data-btn-class="btn-dark" data-btn-text="Iniciar sesión &rarr;">
    <div class="input-group">
        <label for="login-email" class="input-label">
            <input type="email" id="login-email" name="login-email" placeholder="Correo electrónico:" required>
        </label>
    </div>
    <div class="input-group">
        <label for="login-password" class="input-label">
            <input type="password" id="login-password" name="login-password" placeholder="Contraseña:" required minlength="6">
        </label>
    </div>
</div>
