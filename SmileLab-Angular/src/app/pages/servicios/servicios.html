<section class="servicios-page" *ngIf="servicios">
  <!-- Título Principal -->
  <div class="servicios-header">
    <h2 class="section-title-premium">{{ servicios.titulo }}</h2>
  </div>

  <!-- Bloques de Servicios -->
  <div class="service-cards-container">
    @for (item of servicios.items; track item.id) {
      <article class="service-premium-card">
        <div class="card-image">
          <img [src]="item.imagen" [alt]="item.alt" onerror="this.src='img/logo.jpeg'">
        </div>
        <div class="card-content">
          <h3 class="service-name">{{ item.titulo }}</h3>
          <p class="service-desc">{{ item.descripcion }}</p>
        </div>
      </article>
    }
  </div>
</section>
