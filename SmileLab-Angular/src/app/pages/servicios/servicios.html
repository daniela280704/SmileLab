<section class="servicios-page" *ngIf="servicios">
  <h2 class="section-title">{{ servicios.titulo }}</h2>
  <div class="feature-blocks">
    @for (item of servicios.items; track item.id; let i = $index) {
      <article class="feature-block" [class.expanded]="itemExpandido === i">
        <img [src]="item.imagen" [alt]="item.alt" class="img-box-gris">
        <div>
          <h3 (click)="toggleExpand(i)">
            {{ item.titulo }}
            <span class="accordion-icon">{{ itemExpandido === i ? '✕' : '☰' }}</span>
          </h3>
          <p>{{ item.descripcion }}</p>
        </div>
      </article>
    }
  </div>
</section>
