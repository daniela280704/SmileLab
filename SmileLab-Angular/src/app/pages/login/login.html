<section class="login-page-container">
  <div class="login-header">
    <h2 class="login-main-title">Identifícate</h2>
  </div>
  
  <div class="login-card-wrapper">
    <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="premium-login-form">
      <div class="login-input-group">
        <label>Correo electrónico:</label>
        <input type="email" formControlName="email" placeholder="tu@email.com">
      </div>
      
      <div class="login-input-group">
        <label>Contraseña:</label>
        <input type="password" formControlName="password" placeholder="Tu contraseña">
      </div>

      <div class="login-action-container">
        <button type="submit" class="btn-login-submit" [disabled]="loginForm.invalid">
          Iniciar sesión →
        </button>
      </div>

      <div class="login-footer-links">
        <p>¿No tienes cuenta? <a routerLink="/contacto">Regístrate aquí</a></p>
      </div>
    </form>
  </div>
</section>
