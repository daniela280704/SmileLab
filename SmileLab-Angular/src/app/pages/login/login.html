<section class="login-section">
  <h2>Inicia sesión en SmileLab</h2>
  
  <form [formGroup]="loginForm" (ngSubmit)="ingresar()" class="login-form">
    <div class="input-group">
      <label class="input-label">
        <input type="email" formControlName="email" placeholder="Correo electrónico">
      </label>
    </div>
    
    <div class="input-group">
      <label class="input-label">
        <input type="password" formControlName="password" placeholder="Contraseña">
      </label>
    </div>

    <div class="login-btn-container">
      <button type="submit" class="btn-dark" [disabled]="loginForm.invalid">
        Ingresar al Portal
      </button>
    </div>

    <p style="text-align: center; margin-top: 1rem; color: #666; font-size: 0.9rem;">
      ¿No tienes cuenta? <a routerLink="/contacto" style="color: var(--azul-medio); font-weight: 600;">Regístrate aquí</a>
    </p>
  </form>
</section>
