<section class="login-page-container">
  <div class="login-header">
    <h2 class="login-main-title">Identifícate</h2>
  </div>
  
  <div class="login-card-wrapper">
    <form [formGroup]="loginForm" class="premium-login-form">
      <div class="login-input-group">
        <label>Correo electrónico:</label>
        <input type="email" formControlName="email" placeholder="tu@email.com">
      </div>
      
      <div class="login-input-group">
        <label>Contraseña:</label>
        <input type="password" formControlName="password" placeholder="Tu contraseña">
      </div>
      
      @if (errorMessage) {
        <div class="login-error-message">
          {{ errorMessage }}
        </div>
      }

      <div class="login-action-container">
        <button type="button" (click)="onLogin()" class="btn-login-submit">
          Iniciar sesión →
        </button>
      </div>

      <div class="login-footer-links">
        <p>¿No tienes cuenta? <a routerLink="/registro">Regístrate aquí</a></p>
      </div>
    </form>
  </div>
</section>
