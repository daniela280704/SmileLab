<!-- Estructura visual (Template) del componente Producto detalle -->
@if (producto) {
  <div class="producto-detalle-container">
  
  <div class="product-detail-hero">
    <div class="product-hero-container">
      
      <div class="product-info-side">
        <h1 class="product-title">{{ producto.nombre }}</h1>
        <p class="product-description">
          {{ producto.descripcion }}
        </p>
        <button class="btn-price-tag">{{ producto.precio }}</button>
      </div>

      <div class="product-image-side">
        <div class="detail-img-card">
          <img [src]="producto.imagen" [alt]="producto.nombre">
        </div>
      </div>

    </div>
  </div>

</div>
} @else {
  <div class="not-found">
    <p>Cargando producto o no encontrado...</p>
    <a routerLink="/productos">Volver a la tienda</a>
  </div>
}
