<section style="padding: 4rem 10%; max-width: 800px; margin: 0 auto;">
  <div style="background: white; padding: 3rem; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); border: 1px solid #e5e7eb;">
    <h2 style="color: #1e3a8a; margin-bottom: 2rem; border-bottom: 2px solid #eff6ff; padding-bottom: 1rem;">Mi Perfil</h2>

    @if (perfil) {
      <div style="display: grid; gap: 1.5rem;">
        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
          <label style="font-weight: 600; color: #64748b; font-size: 0.85rem; text-transform: uppercase;">Nombre Completo</label>
          <p style="font-size: 1.1rem; color: #1e3a5f; margin: 0;">{{ perfil.nombre }}</p>
        </div>

        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
          <label style="font-weight: 600; color: #64748b; font-size: 0.85rem; text-transform: uppercase;">Correo Electrónico</label>
          <p style="font-size: 1.1rem; color: #1e3a5f; margin: 0;">{{ perfil.email }}</p>
        </div>

        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
          <label style="font-weight: 600; color: #64748b; font-size: 0.85rem; text-transform: uppercase;">Teléfono</label>
          <p style="font-size: 1.1rem; color: #1e3a5f; margin: 0;">{{ perfil.telefono }}</p>
        </div>

        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
          <label style="font-weight: 600; color: #64748b; font-size: 0.85rem; text-transform: uppercase;">Rol en el Sistema</label>
          <span [style.background-color]="perfil.rol === 'admin' ? '#dcfce7' : '#eff6ff'"
                [style.color]="perfil.rol === 'admin' ? '#166534' : '#1e40af'"
                style="padding: 0.4rem 1rem; border-radius: 50px; font-size: 0.9rem; font-weight: 600; align-self: flex-start; text-transform: capitalize;">
            {{ perfil.rol }}
          </span>
        </div>

        <div style="margin-top: 1rem; padding-top: 1.5rem; border-top: 1px solid #f1f5f9; display: flex; gap: 1rem;">
          @if (perfil.rol === 'admin') {
            <a routerLink="/admin-crear-producto" style="background: #1e3a8a; color: white; padding: 0.8rem 1.5rem; border-radius: 6px; text-decoration: none; font-weight: 600; font-size: 0.9rem;">
              Panel de Administración
            </a>
          }
          <a routerLink="/citas" style="background: #eff6ff; color: #1e40af; padding: 0.8rem 1.5rem; border-radius: 6px; text-decoration: none; font-weight: 600; font-size: 0.9rem;">
            Mis Citas
          </a>
        </div>
      </div>
    } @else {
      <div style="text-align: center; padding: 2rem;">
        <p style="color: #64748b;">Cargando información de tu perfil...</p>
      </div>
    }
  </div>
</section>
