@if (equipo) {
  <!-- Hero Equipo -->
  <section class="team-hero">
    <div class="hero-content">
      <h1 class="team-main-title">{{ equipo.titulo }}</h1>
      <p class="team-description">{{ equipo.descripcion }}</p>
    </div>
    <div class="hero-image-container">
      <img [src]="equipo.imagen" [alt]="equipo.alt" class="team-hero-img" onerror="this.src='img/equipo.jpg'">
    </div>
  </section>

  <!-- Título Sección Profesionales -->
  <div class="section-title-container">
    <h2 class="professional-title">{{ equipo.subtitulo }}</h2>
  </div>

  <!-- Grid de Miembros -->
  <section class="team-grid">
    @for (miembro of equipo.miembros; track miembro.nombre) {
      <article class="member-card">
        <div class="member-image-box">
          <img [src]="miembro.imagen" [alt]="miembro.alt" onerror="this.src='img/default-user.png'">
        </div>
        <div class="member-info">
          <h3 class="member-name">{{ miembro.nombre }}</h3>
          <p class="member-role">{{ miembro.cargo }}</p>
          <p class="member-desc">{{ miembro.descripcion }}</p>
        </div>
      </article>
    }
  </section>
}
