@if (inicio) {
  <!-- Banner Hero principal (Gradiente Azul) -->
  <section class="main-hero-banner">
    <div class="banner-content">
      <h1>{{ inicio.titulo }}</h1>
    </div>
  </section>

  <!-- Sección Sobre Nosotros -->
  <div class="about-us-section">
    <div class="hero-section">
      <div class="hero-content">
        <h2 class="about-title">{{ inicio.sobreNosotros.titulo }}</h2>
        <p>{{ inicio.sobreNosotros.texto }}</p>
        <div class="btn-group">
          <a routerLink="/equipo">
            <button class="btn-primary">{{ inicio.sobreNosotros.botonTexto }}</button>
          </a>
        </div>
      </div>
      <div class="hero-image">
        <img [src]="inicio.sobreNosotros.imagen" [alt]="inicio.sobreNosotros.alt" onerror="this.src='img/equipo.jpg'">
      </div>
    </div>
  </div>

  <!-- Sección Servicios -->
  <section class="servicios-section">
    <h2 class="section-title-alt">{{ inicio.servicios.titulo }}</h2>
    <div class="servicios-grid">
      @for (item of inicio.servicios.items; track item.titulo) {
        <article class="servicio-card">
          <div class="thumb-placeholder">
            <img [src]="item.imagen" [alt]="item.alt" onerror="this.src='img/logo.jpeg'">
          </div>
          <div class="card-body">
            <h3>{{ item.titulo }}</h3>
            <p>{{ item.descripcion }}</p>
          </div>
        </article>
      }
    </div>
    <div class="btn-wrap">
      <a routerLink="/servicios">
        <button class="btn-primary-alt">{{ inicio.servicios.botonTexto }}</button>
      </a>
    </div>
  </section>
}
