<section class="page-hero" style="background-image: url('img/contacto-hero.jpg');">
  <h1>Contacto y Citas</h1>
</section>

<section>
  <h2 class="section-title">Estamos para ayudarte</h2>
  <div class="contact-cards-container">
    <article class="contact-card">
      <div class="contact-icon tel">📞</div>
      <strong>Teléfono</strong>
      <p><a href="tel:912345678">912 345 678</a></p>
    </article>
    <article class="contact-card">
      <div class="contact-icon whatsapp">💬</div>
      <strong>Whatsapp</strong>
      <p><a href="https://wa.me/34600000000" target="_blank">600 000 000</a></p>
    </article>
    <article class="contact-card">
      <div class="contact-icon email">✉</div>
      <strong>Email</strong>
      <p><a href="mailto:info@smilelab.com">info@smilelab.com</a></p>
    </article>
  </div>
</section>

<section class="contact-form-section">
  <h3>Solicita tu cita y crea tu cuenta</h3>
  <form [formGroup]="registroForm" (ngSubmit)="enviarDatos()" class="combined-form">
    <div class="form-grid">
      <div class="form-group">
        <label for="reg-nombre">Nombre completo:</label>
        <input type="text" id="reg-nombre" formControlName="nombre" placeholder="Ej: Juan Pérez">
      </div>
      
      <div class="form-group">
        <label for="user-email">Correo electrónico:</label>
        <input type="email" id="user-email" formControlName="email" placeholder="Ej: juan@email.com">
      </div>

      <div class="form-group">
        <label for="reg-tel">Teléfono (9 dígitos):</label>
        <input type="tel" id="reg-tel" formControlName="telefono" placeholder="Ej: 600123456">
      </div>

      <div class="form-group">
        <label for="reg-password">Contraseña:</label>
        <input type="password" id="reg-password" formControlName="password" placeholder="Mínimo 6 caracteres">
      </div>

      <div class="form-group">
        <label for="appointment-day">Fecha de la cita:</label>
        <input type="date" id="appointment-day" formControlName="fechaCita">
      </div>

      <div class="form-group">
        <label for="appointment-time">Hora:</label>
        <input type="time" id="appointment-time" formControlName="horaCita">
      </div>

      <div class="form-group full-width">
        <label for="appointment-reason">Motivo de la cita:</label>
        <input type="text" id="appointment-reason" formControlName="motivoCita" placeholder="Ej: Revisión anual">
      </div>

      <div class="form-group full-width">
        <label for="appointment-professional">Nombre del profesional:</label>
        <input type="text" id="appointment-professional" formControlName="profesional" placeholder="Ej: Dr. García">
      </div>
    </div>

    <button type="submit" class="btn-primary" style="width: 100%; margin-top: 2rem;" [disabled]="registroForm.invalid">
      Enviar y registrarme
    </button>
  </form>
</section>

<div class="hero-section">
  <div class="hero-content">
    <h1>¿Dónde estamos?</h1>
    <p>Visítanos en nuestra clínica del centro. Contamos con parking gratuito para pacientes y acceso adaptado.</p>
    <a href="https://maps.google.com" target="_blank">
      <button class="btn-primary">Abrir en Google Maps</button>
    </a>
  </div>
  <div class="hero-image">
    <img src="img/contacto-hero.jpg" alt="Mapa de ubicación">
  </div>
</div>
